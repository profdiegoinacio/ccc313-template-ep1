name: GitHub Classroom Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── EX 01 ────────────────────────────────────────────────────────────────

      - name: Ex01 - Ano bissexto (2024)
        id: ex01-bissexto
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex01 - Ano bissexto (2024)
          setup-command: ''
          command: python ex01_ano_bissexto.py
          input: '2024'
          expected-output: 'Bissexto'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex01 - Ano nao bissexto (1900)
        id: ex01-nao-bissexto
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex01 - Ano nao bissexto (1900)
          setup-command: ''
          command: python ex01_ano_bissexto.py
          input: '1900'
          expected-output: 'Nao bissexto'
          comparison-method: included
          timeout: 10
          max-score: 4

      # ── EX 02 ────────────────────────────────────────────────────────────────

      - name: Ex02 - IMC Peso normal
        id: ex02-normal
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex02 - IMC Peso normal
          setup-command: ''
          command: python ex02_imc.py
          input: |
            70
            1.75
          expected-output: 'Peso normal'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex02 - IMC Obesidade
        id: ex02-obesidade
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex02 - IMC Obesidade
          setup-command: ''
          command: python ex02_imc.py
          input: |
            100
            1.70
          expected-output: 'Obesidade'
          comparison-method: included
          timeout: 10
          max-score: 4

      # ── EX 03 ────────────────────────────────────────────────────────────────

      - name: Ex03 - Conceito B
        id: ex03-b
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex03 - Conceito B
          setup-command: ''
          command: python ex03_conceitos.py
          input: '8.3'
          expected-output: 'B'
          comparison-method: exact
          timeout: 10
          max-score: 4

      - name: Ex03 - Conceito F
        id: ex03-f
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex03 - Conceito F
          setup-command: ''
          command: python ex03_conceitos.py
          input: '5.9'
          expected-output: 'F'
          comparison-method: exact
          timeout: 10
          max-score: 4

      # ── EX 04 ────────────────────────────────────────────────────────────────

      - name: Ex04 - Dia util
        id: ex04-util
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex04 - Dia util
          setup-command: ''
          command: python ex04_dia_semana.py
          input: '3'
          expected-output: 'Dia util'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex04 - Fim de semana
        id: ex04-fds
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex04 - Fim de semana
          setup-command: ''
          command: python ex04_dia_semana.py
          input: '7'
          expected-output: 'Fim de semana'
          comparison-method: included
          timeout: 10
          max-score: 4

      # ── EX 05 ────────────────────────────────────────────────────────────────

      - name: Ex05 - Tabuada do 7
        id: ex05-7
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex05 - Tabuada do 7
          setup-command: ''
          command: python ex05_tabuada.py
          input: '7'
          expected-output: '7 x 10 = 70'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex05 - Tabuada do 3
        id: ex05-3
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex05 - Tabuada do 3
          setup-command: ''
          command: python ex05_tabuada.py
          input: '3'
          expected-output: '3 x 5 = 15'
          comparison-method: included
          timeout: 10
          max-score: 4

      # ── EX 06 ────────────────────────────────────────────────────────────────

      - name: Ex06 - Fatorial de 5
        id: ex06-5
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex06 - Fatorial de 5
          setup-command: ''
          command: python ex06_fatorial.py
          input: '5'
          expected-output: '120'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex06 - Fatorial de 0
        id: ex06-0
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex06 - Fatorial de 0
          setup-command: ''
          command: python ex06_fatorial.py
          input: '0'
          expected-output: '0! = 1'
          comparison-method: included
          timeout: 10
          max-score: 4

      # ── EX 07 ────────────────────────────────────────────────────────────────

      - name: Ex07 - Notas Aprovado
        id: ex07-aprovado
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex07 - Notas Aprovado
          setup-command: ''
          command: python ex07_notas_turma.py
          input: |
            3
            7.0
            8.0
            9.0
          expected-output: 'Aprovado'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex07 - Notas Reprovado
        id: ex07-reprovado
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex07 - Notas Reprovado
          setup-command: ''
          command: python ex07_notas_turma.py
          input: |
            2
            4.0
            5.0
          expected-output: 'Reprovado'
          comparison-method: included
          timeout: 10
          max-score: 4

      # ── EX 08 ────────────────────────────────────────────────────────────────

      - name: Ex08 - Geometria raio 5
        id: ex08-5
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex08 - Geometria raio 5
          setup-command: ''
          command: python ex08_geometria.py
          input: '5'
          expected-output: '78.54'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex08 - Geometria raio 3
        id: ex08-3
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex08 - Geometria raio 3
          setup-command: ''
          command: python ex08_geometria.py
          input: '3'
          expected-output: '28.27'
          comparison-method: included
          timeout: 10
          max-score: 4

      # ── EX 09 ────────────────────────────────────────────────────────────────

      - name: Ex09 - Senha Muito Fraca
        id: ex09-fraca
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex09 - Senha Muito Fraca
          setup-command: ''
          command: python ex09_senha.py
          input: 'abc'
          expected-output: 'Muito Fraca'
          comparison-method: exact
          timeout: 10
          max-score: 4

      - name: Ex09 - Senha Muito Forte
        id: ex09-forte
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex09 - Senha Muito Forte
          setup-command: ''
          command: python ex09_senha.py
          input: 'Python@99!'
          expected-output: 'Muito Forte'
          comparison-method: exact
          timeout: 10
          max-score: 5

      # ── EX 10 ────────────────────────────────────────────────────────────────

      - name: Ex10 - Primos ate 20
        id: ex10-20
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex10 - Primos ate 20
          setup-command: ''
          command: python ex10_primos.py
          input: '20'
          expected-output: 'Total: 8 primos'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex10 - Primos ate 10
        id: ex10-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex10 - Primos ate 10
          setup-command: ''
          command: python ex10_primos.py
          input: '10'
          expected-output: 'Total: 4 primos'
          comparison-method: included
          timeout: 10
          max-score: 5

      # ── EX 11 ────────────────────────────────────────────────────────────────

      - name: Ex11 - Cifra PYTHON deslocamento 3
        id: ex11-python
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex11 - Cifra PYTHON deslocamento 3
          setup-command: ''
          command: python ex11_cifra_cesar.py
          input: |
            PYTHON
            3
          expected-output: 'SBWKRQ'
          comparison-method: exact
          timeout: 10
          max-score: 4

      - name: Ex11 - Cifra ALGORITMO deslocamento 1
        id: ex11-algoritmo
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex11 - Cifra ALGORITMO deslocamento 1
          setup-command: ''
          command: python ex11_cifra_cesar.py
          input: |
            ALGORITMO
            1
          expected-output: 'BMHPSJUNP'
          comparison-method: exact
          timeout: 10
          max-score: 5

      # ── EX 12 ────────────────────────────────────────────────────────────────

      - name: Ex12 - Oraculo Binario acerto imediato (64)
        id: ex12-64
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex12 - Oraculo Binario acerto imediato (64)
          setup-command: ''
          command: python ex12_oraculo_binario.py
          input: '64'
          expected-output: '1 tentativa'
          comparison-method: included
          timeout: 10
          max-score: 4

      - name: Ex12 - Oraculo Binario 5 tentativas (100)
        id: ex12-100
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Ex12 - Oraculo Binario 5 tentativas (100)
          setup-command: ''
          command: python ex12_oraculo_binario.py
          input: '100'
          expected-output: '5 tentativa'
          comparison-method: included
          timeout: 10
          max-score: 5

      # ── REPORTER (obrigatório para o painel do Classroom) ────────────────────

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          EX01-BISSEXTO_RESULTS: "${{ steps.ex01-bissexto.outputs.result }}"
          EX01-NAO-BISSEXTO_RESULTS: "${{ steps.ex01-nao-bissexto.outputs.result }}"
          EX02-NORMAL_RESULTS: "${{ steps.ex02-normal.outputs.result }}"
          EX02-OBESIDADE_RESULTS: "${{ steps.ex02-obesidade.outputs.result }}"
          EX03-B_RESULTS: "${{ steps.ex03-b.outputs.result }}"
          EX03-F_RESULTS: "${{ steps.ex03-f.outputs.result }}"
          EX04-UTIL_RESULTS: "${{ steps.ex04-util.outputs.result }}"
          EX04-FDS_RESULTS: "${{ steps.ex04-fds.outputs.result }}"
          EX05-7_RESULTS: "${{ steps.ex05-7.outputs.result }}"
          EX05-3_RESULTS: "${{ steps.ex05-3.outputs.result }}"
          EX06-5_RESULTS: "${{ steps.ex06-5.outputs.result }}"
          EX06-0_RESULTS: "${{ steps.ex06-0.outputs.result }}"
          EX07-APROVADO_RESULTS: "${{ steps.ex07-aprovado.outputs.result }}"
          EX07-REPROVADO_RESULTS: "${{ steps.ex07-reprovado.outputs.result }}"
          EX08-5_RESULTS: "${{ steps.ex08-5.outputs.result }}"
          EX08-3_RESULTS: "${{ steps.ex08-3.outputs.result }}"
          EX09-FRACA_RESULTS: "${{ steps.ex09-fraca.outputs.result }}"
          EX09-FORTE_RESULTS: "${{ steps.ex09-forte.outputs.result }}"
          EX10-20_RESULTS: "${{ steps.ex10-20.outputs.result }}"
          EX10-10_RESULTS: "${{ steps.ex10-10.outputs.result }}"
          EX11-PYTHON_RESULTS: "${{ steps.ex11-python.outputs.result }}"
          EX11-ALGORITMO_RESULTS: "${{ steps.ex11-algoritmo.outputs.result }}"
          EX12-64_RESULTS: "${{ steps.ex12-64.outputs.result }}"
          EX12-100_RESULTS: "${{ steps.ex12-100.outputs.result }}"
        with:
          runners: >-
            ex01-bissexto,ex01-nao-bissexto,
            ex02-normal,ex02-obesidade,
            ex03-b,ex03-f,
            ex04-util,ex04-fds,
            ex05-7,ex05-3,
            ex06-5,ex06-0,
            ex07-aprovado,ex07-reprovado,
            ex08-5,ex08-3,
            ex09-fraca,ex09-forte,
            ex10-20,ex10-10,
            ex11-python,ex11-algoritmo,
            ex12-64,ex12-100
